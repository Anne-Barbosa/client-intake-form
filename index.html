<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Intake Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Client Intake Form</h1>
        <p>Please fill out the following information to help us better serve you.</p>
        <form id="intake-form">
            <fieldset>
                <legend>Personal Information</legend>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required placeholder="Enter your name">

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email">

                <label for="age">Age (optional)</label>
                <input type="number" id="age" name="age" placeholder="Age" min="10" max="100">
            </fieldset>

            <fieldset>
                <legend>Financial Profile</legend>
                <label for="profile">Select your current financial situation:</label>
                <select id="profile" name="profile" required>
                    <option value="">Select your profile</option>
                    <option value="student">Student</option>
                    <option value="employed">Employed</option>
                    <option value="self-employed">Self-employed</option>
                    <option value="unemployed">Unemployed</option>
                </select>
            </fieldset>

            <fieldset>
                <legend>Client Goals</legend>
                <label><input type="radio" id="save-money" name="goal" value="save-money" required>
                    Save money
                </label>

                <label><input type="radio" id="invest" name="goal" value="invest">
                    Invest
                </label>

                <label><input type="radio" id="get-out-of-debt" name="goal" value="get-out-of-debt">
                    Get out of debt
                </label>

                <label><input type="radio" id="financial-planning" name="goal" value="financial-planning">
                    Financial Planning
                </label>
            </fieldset>

            <fieldset>
                <legend>Area of Interest</legend>
                <label><input type="checkbox" id="budgeting" name="interest" value="budgeting">
                    Budgeting
                </label>

                <label><input type="checkbox" id="investing" name="interest" value="investing">
                    Investing
                </label>

                <label><input type="checkbox" id="retirement-planning" name="interest" value="retirement-planning">
                    Retirement Planning
                </label>

                <label><input type="checkbox" id="emergency-fund" name="interest" value="emergency-fund">
                    Emergency Fund
                </label>

                <label><input type="checkbox" id="debt-control" name="interest" value="debt-control">
                    Debt Control
                </label>
            </fieldset>

            <fieldset>
                <legend>Comments</legend>
                <textarea id="comments" name="comments" placeholder="Any additional comments..."></textarea>
            </fieldset>

            <button type="submit">Submit Form</button>
            <button type="reset">Clear</button>
        </form>
    </div>
</body>
</html>
